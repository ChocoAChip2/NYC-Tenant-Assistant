<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Tenant Assistant | Login</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    form { display: grid; gap: 12px; }
    input, button { padding: 10px; font-size: 16px; }
    .error { color: #b00020; }
    .success { color: #1b7f3b; }
  </style>
</head>
<body>
  <h1>Log in</h1>
  <p>Use your confirmed Supabase account to continue.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <p class="{{ category }}">{{ message }}</p>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">
    <label>
      Email
      <input type="email" name="email" required>
    </label>
    <label>
      Password
      <input type="password" name="password" required>
    </label>
    <button type="submit">Log In</button>
  </form>

  <p>Need an account? <a href="{{ url_for('main.signup') }}">Create one</a></p>
</body>
</html>
