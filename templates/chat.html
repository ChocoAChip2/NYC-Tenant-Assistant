<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Tenant Assistant | Chat</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #202123;
      --panel: #343541;
      --panel-alt: #444654;
      --border: #4b4d5d;
      --text: #ececf1;
      --muted: #acacbe;
      --accent: #10a37f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #2b2c32;
    }
    .meta { color: var(--muted); font-size: 14px; }
    main {
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #chat-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #2d2f39;
      min-height: 60vh;
      overflow-y: auto;
      padding: 14px;
    }
    .message {
      border-radius: 10px;
      padding: 12px 14px;
      line-height: 1.45;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }
    .message.user { background: var(--panel-alt); }
    .message.assistant { background: var(--panel); border: 1px solid var(--border); }
    .label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    form {
      width: min(900px, 100%);
      margin: 0 auto;
      padding: 14px 20px 20px;
      display: flex;
      gap: 10px;
    }
    textarea {
      flex: 1;
      resize: vertical;
      min-height: 54px;
      max-height: 180px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #40414f;
      color: var(--text);
      font: inherit;
    }
    button {
      min-width: 90px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      padding: 0 16px;
    }
    button:disabled { opacity: .65; cursor: not-allowed; }
    .warning {
      margin: 0 auto;
      width: min(900px, calc(100% - 40px));
      background: #5f3b14;
      color: #ffdfb2;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #775126;
    }
    a { color: #9cdcff; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 style="margin:0;font-size:20px;">NYC Tenant Assistant</h1>
      <p class="meta">Logged in as <strong>{{ user_email }}</strong></p>
    </div>
    <a href="{{ url_for('main.logout') }}">Log out</a>
  </header>

  {% if not ai_ready %}
    <p class="warning">GEMINI_API_KEY is not configured, so AI replies are currently disabled.</p>
  {% endif %}

  <main>
    <div id="chat-box"></div>
  </main>

  <form id="chat-form">
    <textarea id="message-input" placeholder="Message NYC Tenant Assistant" required></textarea>
    <button id="send-btn" type="submit" {% if not ai_ready %}disabled{% endif %}>Send</button>
  </form>

  <script>
    const chatBox = document.getElementById("chat-box");
    const chatForm = document.getElementById("chat-form");
    const messageInput = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");

    const messages = [
      {
        role: "assistant",
        content: "Hi! I'm your NYC Tenant Assistant. Ask me a housing or tenant-rights question."
      }
    ];

    function renderMessage(role, content) {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const label = document.createElement("span");
      label.className = "label";
      label.textContent = role === "user" ? "You" : "Assistant";

      const body = document.createElement("div");
      body.textContent = content;

      wrapper.appendChild(label);
      wrapper.appendChild(body);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    renderMessage("assistant", messages[0].content);

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const text = messageInput.value.trim();
      if (!text) return;

      messages.push({ role: "user", content: text });
      renderMessage("user", text);
      messageInput.value = "";
      sendBtn.disabled = true;

      try {
        const response = await fetch("{{ url_for('main.chat_message') }}", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages })
        });

        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "Request failed.");

        messages.push({ role: "assistant", content: payload.reply });
        renderMessage("assistant", payload.reply);
      } catch (error) {
        renderMessage("assistant", `Sorry, I hit an error: ${error.message}`);
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    });
  </script>
</body>
</html>
